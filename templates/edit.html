{% extends "base.html" %}
{% block content %}

<h2>แก้ไขข้อมูล</h2>

<form action="/update/{{ farm.id }}" method="post">
    <input type="number" step="0.1" name="area" value="{{ farm.area }}" required>
    <input type="number" step="0.1" name="price_per_ton" value="{{ farm.price_per_ton }}" required>
    <input type="date" name="plant_date" value="{{ farm.plant_date }}" required>
    <button type="submit">อัปเดต</button>
</form>

{% endblock %}
