{% extends "base.html" %}
{% block content %}

<h3>เพิ่มลูกสวน</h3>

<form method="post">
<div class="mb-3">
<label>ชื่อ</label>
<input type="text" name="farmer_name" class="form-control" required>
</div>

<div class="mb-3">
<label>เบอร์โทร</label>
<input type="text" name="phone" class="form-control" required>
</div>

<div class="mb-3">
<label>พื้นที่ (ไร่)</label>
<input type="number" step="0.1" name="area_rai" class="form-control" required>
</div>

<div class="mb-3">
<label>วันปลูก</label>
<input type="date" name="plant_date" class="form-control" required>
</div>

<button class="btn btn-success">บันทึก</button>
</form>

{% endblock %}
