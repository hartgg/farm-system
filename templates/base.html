<!DOCTYPE html>
<html>
<head>
    <title>RAI-DAENG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background-color: #c62400;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .navbar .brand {
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
        }

        .navbar .menu {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            white-space: nowrap;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        /* มือถือ */
        @media (max-width: 480px) {
            .navbar {
                padding: 10px 12px;
                display: flex;
            }

            .navbar .brand {
                font-size: 14px;
            }

            .navbar a {
                font-size: 13px;
            }
        }

        /* ===== CONTAINER ===== */
        .container {
            padding: 20px;
        }

        /* ===== CARD ===== */
        .card {
            background: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        /* ===== TABLE ===== */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 600px;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            font-size: 14px;
        }

        th {
            background-color: #e8f5e9;
        }

        /* ===== FORM & BUTTON ===== */
        input, select {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            max-width: 300px;
            box-sizing: border-box;
        }

        button {
            padding: 8px 14px;
            background: #2e7d32;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background: #1b5e20;
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 768px) {

            .navbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .navbar .menu {
                width: 100%;
                justify-content: flex-start;
            }

            h2, h3 {
                font-size: 18px;
            }

            .container {
                padding: 15px;
            }

            table {
                font-size: 13px;
            }

        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="brand">🌱 RAI-DAENG System</div>
    <div class="menu">
        <a href="/">หน้าแรก</a>
        <a href="/dashboard">Dashboard</a>
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
