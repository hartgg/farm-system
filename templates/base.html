<!DOCTYPE html>
<html>
<head>
    <title>RAI-DAENG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background-color: #c62400;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .navbar .brand {
            font-size: 20px;
            font-weight: bold;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        /* ===== CONTAINER ===== */
        .container {
            padding: 30px;
        }

        /* ===== TABLE ===== */
        table {
            border-collapse: collapse;
            width: 100%;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background-color: #e8f5e9;
        }

        /* ===== CARD ===== */
        .card {
            background: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        button {
            padding: 6px 12px;
            background: #2e7d32;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1b5e20;
        }

        input, select {
            padding: 6px;
            margin: 4px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="brand">🌱 RAI-DAENG System</div>
    <div>
        <a href="/">หน้าแรก</a>
        <a href="/dashboard">Dashboard</a>
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
