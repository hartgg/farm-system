<!DOCTYPE html>
<html>
<head>
    <title>ระบบจัดการสวน</title>
</head>
<body>

<h2>เพิ่มข้อมูลแปลงปลูก</h2>

<form method="post" action="/add">
    <input type="text" name="farmer_name" placeholder="ชื่อเกษตรกร" required>

    <select name="variety" required>
        <option value="">เลือกสายพันธุ์</option>
        <option value="Atlantic">Atlantic</option>
        <option value="Spunta">Spunta</option>
        <option value="Granola">Granola</option>
        <option value="Lady Rosetta">Lady Rosetta</option>
        <option value="Kennebec">Kennebec</option>
    </select>

    <input type="number" step="0.01" name="area" placeholder="พื้นที่ (ไร่)" required>
    <input type="number" step="0.01" name="price_per_ton" placeholder="ราคาต่อตัน" required>
    <input type="date" name="plant_date" required>

    <button type="submit">บันทึก</button>
</form>

<hr>

<h2>รายการแปลงปลูก</h2>

<table border="1">
<tr>
    <th>ชื่อ</th>
    <th>สายพันธุ์</th>
    <th>พื้นที่</th>
    <th>ผลผลิต (ตัน)</th>
    <th>รายได้ (บาท)</th>
    <th>วันเก็บเกี่ยว</th>
</tr>

{% for farm in farms %}
<tr>
    <td>{{ farm.farmer_name }}</td>
    <td>{{ farm.variety }}</td>
    <td>{{ farm.area }}</td>
    <td>{{ farm.expected_yield }}</td>
    <td>{{ farm.expected_income }}</td>
    <td>{{ farm.harvest_date }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
